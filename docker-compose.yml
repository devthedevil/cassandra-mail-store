services:
  cassandra:
    image: cassandra:5.0
    container_name: mailstore-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: mailstore-dev
      MAX_HEAP_SIZE: 1024M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - cassandra-data:/var/lib/cassandra

volumes:
  cassandra-data:

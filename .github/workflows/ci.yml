name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # `verify` runs unit tests (surefire) and the Testcontainers-based
      # integration tests (failsafe) against a real Cassandra 5 container.
      - name: Build and test
        run: mvn -B verify
